# Docker Compose configuration for Code Architect Agent
# Runs backend API and frontend web UI with development hot-reload support
# Version: 1.0

version: '3.8'

services:
  # Backend API server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: code-architect-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=false
    volumes:
      - ./src:/app/src
      - ./projects:/app/projects  # Mount projects directory
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - architect-network

  # Frontend web server (development)
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: code-architect-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
    depends_on:
      - backend
    networks:
      - architect-network

  # Optional: PostgreSQL for production state
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: code-architect-db
  #   environment:
  #     POSTGRES_DB: architect
  #     POSTGRES_USER: architect
  #     POSTGRES_PASSWORD: changeme
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - architect-network

  # Optional: Redis for caching
  # redis:
  #   image: redis:7-alpine
  #   container_name: code-architect-redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - architect-network

networks:
  architect-network:
    driver: bridge

